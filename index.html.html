    body{background:#060c18;font-family:'Sora',sans-serif}
    select option{background:#0d1525;color:#e2e8f0}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(37,99,235,0.25);border-radius:99px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes urgencyPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 16px 2px rgba(239,68,68,0.08)}}
    @keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(300%)}}
  </style>
